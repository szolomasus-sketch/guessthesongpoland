<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaka to melodia – edycja Twitch (ESKA Hity 2026)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(0,0,0,0.65);
      padding: 30px;
      border-radius: 16px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    h1 { margin: 0 0 16px; font-size: 2.4em; color: #ff79c6; }
    #status { font-size: 1.1em; margin: 12px 0 20px; color: #4ade80; font-weight: bold; }
    .input-wrapper {
      position: relative;
      width: 90%;
      max-width: 420px;
      margin: 12px auto 20px;
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 1.1em;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    #suggestions {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: rgba(30,30,50,0.97);
      border-radius: 0 0 10px 10px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 10;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .suggestion {
      padding: 12px 16px;
      cursor: pointer;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: background 0.15s;
      font-size: 0.98em;
    }
    .suggestion:hover { background: rgba(100,100,255,0.22); }
    .suggestion:last-child { border-bottom: none; }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    button {
      padding: 11px 22px;
      font-size: 1.05em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.18s;
    }
    #checkBtn { background: #9146ff; color: white; }
    #skipBtn { background: #9146ff55; color: white; }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(145,70,255,0.4); }
    #message {
      font-size: 1.45em;
      margin: 20px 0 12px;
      min-height: 1.6em;
      font-weight: bold;
    }
    .reveal { color: #fbbf24; font-style: italic; }
    iframe {
      width: 100%;
      height: 380px;
      border: none;
      border-radius: 12px;
      margin: 20px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Jaka to melodia – ESKA Hity na Czasie 2026</h1>

  <div id="status">Ładowanie...</div>

  <div class="input-wrapper">
    <input type="text" id="guess" placeholder="Wpisz tytuł lub fragment..." autocomplete="off">
    <div id="suggestions"></div>
  </div>

  <div class="buttons">
    <button id="checkBtn" onclick="checkGuess()">Sprawdź</button>
    <button id="skipBtn" onclick="skipSong()">Pomiń</button>
  </div>

  <div id="message"></div>

  <!-- Embed całej playlisty Spotify -->
  <iframe src="https://open.spotify.com/embed/playlist/368QEMsG0iW195wmsHikb1?utm_source=generator" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
</div>

<script>
// Ręczna lista tytułów z playlisty ESKA LUTY 2026 (pierwsze 30 – możesz dodać więcej)
const playlistTitles = [
  "Pamiętnik",
  "DECIDE",
  "Pray",
  "Purpose In My Life",
  "Komu miałabym powiedzieć?",
  "Turn The Lights Off",
  "Obejmuję noce",
  "Bam 2023",
  "Think About Us",
  "Plan B",
  "Hurts",
  "Feel Your Body",
  "Wracam",
  "Die On This Hill",
  "Hey Son",
  "Love You More",
  "Nie ucieknę",
  "WSZYSCY JESTEŚMY KACPERCZYK",
  "Destiny",
  "Blackout Over",
  "LATARNIE WSZĘDZIE DAWNO ZGASŁY",
  "Miles Away",
  "FERRARI",
  "Ragga Killing",
  "ZA KOGO MNIE MASZ?",
  "American Heart",
  "Waterfalls (feat. Sam Harper & Bobby Harvey)",
  "Wild",
  "Midnight Sun",
  "The Life of a Showgirl"
  // Dodaj resztę z playlisty jeśli chcesz pełną listę
];

let currentSongIndex = Math.floor(Math.random() * playlistTitles.length);
let currentSong = playlistTitles[currentSongIndex];

function checkGuess() {
  const val = document.getElementById('guess').value.trim().toLowerCase();
  if (!val) return;

  const msg = document.getElementById('message');
  const correct = playlistTitles.some(title => title.toLowerCase().includes(val));

  revealSong();

  if (correct) {
    msg.innerHTML += '<br><span class="success">Brawo! Dobrze!</span>';
  } else {
    msg.innerHTML += '<br><span class="fail">Nie tym razem...</span>';
  }

  setTimeout(nextSong, 3000);

  document.getElementById('guess').value = '';
  hideSuggestions();
}

function skipSong() {
  const msg = document.getElementById('message');
  revealSong();
  msg.innerHTML += '<br><span class="fail">Pominięto</span>';
  setTimeout(nextSong, 3000);
}

function revealSong() {
  const msg = document.getElementById('message');
  msg.innerHTML = `<span class="reveal">To był: ${currentSong}</span>`;
}

function nextSong() {
  currentSongIndex = Math.floor(Math.random() * playlistTitles.length);
  currentSong = playlistTitles[currentSongIndex];
  document.getElementById('status').textContent = 'Słuchaj...';
  document.getElementById('message').innerHTML = '';
}

function showSuggestions(query) {
  const div = document.getElementById('suggestions');
  div.innerHTML = '';

  if (!query || query.length < 1) {
    div.style.display = 'none';
    return;
  }

  const lower = query.toLowerCase();
  const matches = playlistTitles.filter(title => title.toLowerCase().includes(lower));

  if (matches.length === 0) {
    div.style.display = 'none';
    return;
  }

  matches.slice(0, 10).forEach(title => {
    const el = document.createElement('div');
    el.className = 'suggestion';
    el.textContent = title;
    el.onclick = () => {
      document.getElementById('guess').value = title;
      div.style.display = 'none';
      checkGuess();
    };
    div.appendChild(el);
  });

  div.style.display = 'block';
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

const guessInput = document.getElementById('guess');
guessInput.addEventListener('input', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('focus', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('blur', () => setTimeout(hideSuggestions, 180));

document.addEventListener('click', e => {
  if (!guessInput.contains(e.target) && !document.getElementById('suggestions').contains(e.target)) {
    hideSuggestions();
  }
});
</script>
</body>
</html>
