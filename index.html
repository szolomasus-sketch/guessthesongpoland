<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaka to melodia – edycja Twitch</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .container {
      background: #161b22;
      padding: 30px;
      border-radius: 12px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      border: 1px solid #30363d;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 2.6em;
      color: #9146ff;
      text-shadow: 0 0 10px rgba(145,70,255,0.6);
    }
    #status {
      font-size: 1.1em;
      margin: 12px 0 20px;
      color: #a970ff;
      font-weight: bold;
    }

    .audio-bars {
      height: 60px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      margin: 16px auto 24px;
      width: 90%;
      max-width: 360px;
    }
    .bar {
      width: 8px;
      background: linear-gradient(to top, #9146ff, #a970ff, #b083ff);
      border-radius: 4px 4px 0 0;
      transition: height 0.4s ease-out;
      opacity: 0.85;
    }
    .bar.active { animation: pulse 1.3s infinite ease-in-out; }
    @keyframes pulse {
      0%, 100% { transform: scaleY(1); opacity: 0.85; }
      50%      { transform: scaleY(1.15); opacity: 1; }
    }

    select, input {
      width: 90%;
      max-width: 420px;
      padding: 12px;
      font-size: 1.1em;
      margin: 12px auto;
      border: 1px solid #30363d;
      border-radius: 10px;
      background: #0d1117;
      color: #c9d1d9;
    }
    select:focus, input:focus { outline: none; border-color: #9146ff; }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }
    button {
      padding: 11px 22px;
      font-size: 1.05em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.18s;
    }
    #checkBtn    { background: #9146ff; color: white; }
    #replayBtn   { background: #9146ff88; color: white; }
    #skipBtn     { background: #9146ff55; color: white; }

    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(145,70,255,0.4); }

    #message {
      font-size: 1.45em;
      margin: 20px 0 12px;
      min-height: 1.6em;
      font-weight: bold;
    }
    .success { color: #56d364; }
    .fail    { color: #f85149; }
    .reveal  { color: #f0c674; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <h1>Jaka to melodia – edycja Twitch</h1>

  <div class="audio-bars" id="bars"></div>

  <div id="status">Wybierz utwór i zacznij!</div>

  <!-- Wybór piosenki -->
  <select id="songSelect">
    <option value="">Wybierz piosenkę...</option>
  </select>

  <div class="buttons">
    <button id="checkBtn" onclick="checkGuess()">Sprawdź</button>
    <button id="replayBtn" onclick="playClip()">Odtwórz ponownie</button>
    <button id="skipBtn" onclick="skipSong()">Pomiń</button>
  </div>

  <div id="message"></div>
</div>

<div id="player" style="width:1px;height:1px;overflow:hidden;position:absolute;"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// Ręczna lista ID + tytuły (wyciągnięte z Twojej playlisty)
const SONGS = [
  { id: "AhNQMjtrHgM", title: "Artysta 1 - Tytuł 1" },
  { id: "rR001X7JQy8", title: "Artysta 2 - Tytuł 2" },
  { id: "dEvG0E1NdTY", title: "Artysta 3 - Tytuł 3" },
  { id: "uNVBBXa6CB8", title: "Artysta 4 - Tytuł 4" },
  { id: "fRJcsG7nmtE", title: "Artysta 5 - Tytuł 5" },
  { id: "U_FirAt6UKg", title: "Artysta 6 - Tytuł 6" },
  { id: "npPaN-n7gCk", title: "Artysta 7 - Tytuł 7" },
  { id: "efQJmUr4wAM", title: "Artysta 8 - Tytuł 8" },
  { id: "4IwqHYcYEQA", title: "Artysta 9 - Tytuł 9" },
  { id: "OMkYoXfmlUo", title: "Artysta 10 - Tytuł 10" },
  { id: "7VLShc83YE0", title: "Artysta 11 - Tytuł 11" },
  { id: "uPULY6PIRZQ", title: "Artysta 12 - Tytuł 12" },
  { id: "8_RrKoBdw0o", title: "Artysta 13 - Tytuł 13" },
  { id: "w4k_6tUw2mQ", title: "Artysta 14 - Tytuł 14" },
  { id: "lqWt5L4hZU4", title: "Artysta 15 - Tytuł 15" },
  { id: "ScGIPDlJKMY", title: "Artysta 16 - Tytuł 16" },
  { id: "Ln8rAlXKv7o", title: "Artysta 17 - Tytuł 17" },
  { id: "HNznlRJZRXw", title: "Artysta 18 - Tytuł 18" },
  { id: "8J1stp9AbOk", title: "Artysta 19 - Tytuł 19" },
  { id: "pKqVj-ermPY", title: "Artysta 20 - Tytuł 20" },
  { id: "xSPz6uq3c1g", title: "Artysta 21 - Tytuł 21" },
  { id: "I1PjrpN_87U", title: "Artysta 22 - Tytuł 22" },
  { id: "AeyQI65fJxc", title: "Artysta 23 - Tytuł 23" },
  { id: "Uho7xyVcG5c", title: "Artysta 24 - Tytuł 24" },
  { id: "tSiOWFwHR4U", title: "Artysta 25 - Tytuł 25" },
  { id: "uNqOIeumhZM", title: "Artysta 26 - Tytuł 26" },
  { id: "mnFj4TB89pA", title: "Artysta 27 - Tytuł 27" },
  { id: "cHmYhFesjGs", title: "Artysta 28 - Tytuł 28" },
  { id: "M-0c2BpBmDQ", title: "Artysta 29 - Tytuł 29" },
  { id: "TBVQp9d726Q", title: "Artysta 30 - Tytuł 30" },
  { id: "LnNTD1BBe88", title: "Artysta 31 - Tytuł 31" },
  { id: "ESC0fJ263fY", title: "Artysta 32 - Tytuł 32" },
  { id: "fil7T3YMaqs", title: "Artysta 33 - Tytuł 33" },
  { id: "pk2v0fPfWws", title: "Artysta 34 - Tytuł 34" },
  { id: "Lrf4ZJjbnFE", title: "Artysta 35 - Tytuł 35" },
  { id: "oT9VM2XQPdI", title: "Artysta 36 - Tytuł 36" },
  { id: "BvRbKY8tloo", title: "Artysta 37 - Tytuł 37" },
  { id: "-6KuSa0zgaA", title: "Artysta 38 - Tytuł 38" },
  { id: "oKa9tnfZwP0", title: "Artysta 39 - Tytuł 39" },
  { id: "4EAv2s8jZgo", title: "Artysta 40 - Tytuł 40" },
  { id: "bH28HGZ1SMI", title: "Artysta 41 - Tytuł 41" },
  { id: "TeYGpUbmONo", title: "Artysta 42 - Tytuł 42" },
  { id: "Io65ZonGLos", title: "Artysta 43 - Tytuł 43" },
  { id: "HRsEjGOKFm0", title: "Artysta 44 - Tytuł 44" },
  { id: "iHDJ_xfW26Y", title: "Artysta 45 - Tytuł 45" }
];

let player = null;
let currentSong = null;
let clipLengths = [0.8, 2, 4, 7, 12, 18];
let currentAttempt = 0;
let hasUserInteracted = false;
let currentStartTime = null;

const MAX_DURATION = clipLengths[clipLengths.length - 1];
const barsCount = 10;

function initBars() {
  const container = document.getElementById('bars');
  container.innerHTML = '';
  for (let i = 0; i < barsCount; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    container.appendChild(bar);
  }
}

function updateBars(progress) {
  const bars = document.querySelectorAll('.bar');
  const activeCount = Math.round(barsCount * (progress / MAX_DURATION));
  bars.forEach((bar, i) => {
    if (i < activeCount) {
      bar.style.height = `${30 + Math.random() * 70}%`;
      bar.classList.add('active');
    } else {
      bar.style.height = '10%';
      bar.classList.remove('active');
    }
  });
}

function loadSong(videoId = null) {
  const status = document.getElementById('status');
  status.textContent = 'Ładowanie...';

  currentStartTime = null;

  if (videoId) {
    // wybrany z dropdowna
    currentSong = SONGS.find(s => s.id === videoId);
  } else {
    // losowy przy starcie
    const idx = Math.floor(Math.random() * SONGS.length);
    currentSong = SONGS[idx];
  }

  status.textContent = 'Słuchaj...';

  if (player) {
    player.loadVideoById(currentSong.id);
  } else {
    player = new YT.Player('player', {
      height: '1',
      width: '1',
      videoId: currentSong.id,
      playerVars: {
        autoplay: 0,
        controls: 0,
        modestbranding: 1,
        rel: 0,
        fs: 0,
        mute: 1,
        enablejsapi: 1,
        playsinline: 1,
        disablekb: 1,
        origin: window.location.origin || 'https://www.youtube.com'
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': e => {
          if (e.data === YT.PlayerState.PLAYING && hasUserInteracted) {
            player.unMute();
          }
        }
      }
    });
  }

  resetGame();
  setTimeout(() => playClip(true), 1400);
}

function onPlayerReady(event) {
  console.log('Player gotowy');
}

function playClip(isFirst = false) {
  if (!player) return;

  if (hasUserInteracted) player.unMute();

  let startTime;

  if (isFirst || currentStartTime === null) {
    startTime = Math.max(10, Math.floor(Math.random() * 140));
    currentStartTime = startTime;
  } else {
    startTime = currentStartTime;
  }

  player.seekTo(startTime, true);

  player.playVideo();

  setTimeout(() => {
    player.seekTo(startTime, true);
  }, 200);

  const duration = isFirst ? clipLengths[0] : clipLengths[currentAttempt];

  let elapsed = 0;
  const interval = setInterval(() => {
    elapsed += 0.2;
    updateBars(elapsed);
    if (elapsed >= duration) {
      clearInterval(interval);
      if (player.getPlayerState() === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      }
      updateBars(0);
    }
  }, 200);

  document.getElementById('status').textContent = `Odtwarzam ${duration}s od ${startTime.toFixed(1)}s`;
}

function checkGuess() {
  if (!hasUserInteracted) {
    hasUserInteracted = true;
    if (player) player.unMute();
  }

  const val = document.getElementById('guess').value.trim();
  if (!val) return;

  const msg = document.getElementById('message');
  msg.innerHTML = '<span class="reveal">Brawo czy nie – zgaduj na słuch!</span>';

  setTimeout(loadSong, 2000);

  document.getElementById('guess').value = '';
  hideSuggestions();
}

function skipSong() {
  const msg = document.getElementById('message');

  // Pokazujemy tytuł po pominięciu
  msg.innerHTML = `<span class="reveal">${currentSong.title || 'Tytuł nieznany'}</span><br><span class="fail">Pominięto</span>`;

  setTimeout(loadSong, 3000);
}

function resetGame() {
  currentAttempt = 0;
  document.getElementById('message').textContent = '';
  document.getElementById('guess').value = '';
  updateBars(0);
}

const guessInput = document.getElementById('guess');
guessInput.addEventListener('input', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('focus', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('blur', () => setTimeout(hideSuggestions, 180));

document.addEventListener('click', () => {
  if (!hasUserInteracted) {
    hasUserInteracted = true;
    if (player) player.unMute();
  }
}, { once: true });

function showSuggestions(query) {
  const div = document.getElementById('suggestions');
  div.innerHTML = '';

  if (!query || query.length < 1) {
    div.style.display = 'none';
    return;
  }

  const lower = query.toLowerCase();
  const matches = SONGS.filter(s => s.title.toLowerCase().includes(lower));

  if (matches.length === 0) {
    div.style.display = 'none';
    return;
  }

  matches.slice(0, 10).forEach(song => {
    const el = document.createElement('div');
    el.className = 'suggestion';
    el.textContent = song.title;
    el.onclick = () => {
      document.getElementById('guess').value = song.title;
      div.style.display = 'none';
      checkGuess();
    };
    div.appendChild(el);
  });

  div.style.display = 'block';
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

// Wypełnij dropdown przy starcie
window.addEventListener('load', () => {
  const select = document.getElementById('songSelect');
  SONGS.forEach(song => {
    const opt = document.createElement('option');
    opt.value = song.id;
    opt.textContent = song.title;
    select.appendChild(opt);
  });

  select.addEventListener('change', () => {
    const selectedId = select.value;
    if (selectedId) {
      loadSong(selectedId);
    }
  });

  // Startujemy z losowym utworem
  loadSong();
});

</script>
</body>
</html>
