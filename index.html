<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaka to melodia – test z GitHub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 16px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    h1 { margin: 0 0 20px; font-size: 2.4em; color: #ff79c6; }
    #status { font-size: 1.2em; margin: 15px 0; color: #a970ff; font-weight: bold; }
    #player-container {
      margin: 20px 0;
      text-align: center;
    }
    audio {
      width: 100%;
      max-width: 400px;
      margin: 15px auto;
      display: block;
    }
    .input-wrapper {
      position: relative;
      width: 90%;
      max-width: 420px;
      margin: 20px auto;
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 1.1em;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    button {
      padding: 12px 28px;
      font-size: 1.1em;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    #checkBtn { background: #9146ff; color: white; }
    #replayBtn { background: #10b981; color: white; }
    #skipBtn { background: #f59e0b; color: white; }
    button:hover { transform: scale(1.05); }
    #message {
      font-size: 1.5em;
      margin: 25px 0;
      min-height: 1.8em;
      font-weight: bold;
    }
    .success { color: #56d364; }
    .fail { color: #f85149; }
    .reveal { color: #f0c674; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <h1>Jaka to melodia – test GitHub</h1>

  <div id="status">Ładowanie utworu...</div>

  <div id="player-container">
    <audio id="audioPlayer" controls></audio>
  </div>

  <div class="input-wrapper">
    <input type="text" id="guess" placeholder="Wpisz tytuł / artystę..." autocomplete="off">
  </div>

  <div>
    <button id="checkBtn" onclick="checkGuess()">Sprawdź</button>
    <button id="replayBtn" onclick="playClip()">Odtwórz ponownie</button>
  </div>

  <div id="message"></div>
</div>

<script>
// Dane utworu – możesz dodać więcej w tablicy songs
const songs = [
  {
    title: "Bruno Mars - Dance With Me",
    artist: "Bruno Mars",
    file: "https://raw.githubusercontent.com/szolomasus-sketch/guessthesongpoland/main/Bruno%20Mars%20-%20Dance%20With%20Me%20%5BOfficial%20Audio%5D.m4a"
  }
  // Dodaj kolejne utwory tutaj w przyszłości, np.:
  // { title: "Inny utwór - Artysta", file: "https://raw.githubusercontent.com/.../nazwa.mp3" }
];

let currentSong = songs[0]; // na razie tylko jeden utwór
let audio = document.getElementById('audioPlayer');
let currentStartTime = null;

function loadSong() {
  document.getElementById('status').textContent = 'Ładowanie utworu...';
  audio.src = currentSong.file;
  audio.load();
  audio.onloadeddata = () => {
    document.getElementById('status').textContent = 'Słuchaj...';
    playClip(true);
  };
  audio.onerror = () => {
    document.getElementById('status').textContent = 'Błąd ładowania pliku – sprawdź link';
  };
}

function playClip(isFirst = false) {
  if (!audio) return;

  let startTime;

  if (isFirst || currentStartTime === null) {
    startTime = Math.max(10, Math.floor(Math.random() * 140)); // losowy start od 10 s
    currentStartTime = startTime;
  } else {
    startTime = currentStartTime;
  }

  audio.currentTime = startTime;
  audio.play().catch(err => {
    console.log("Błąd odtwarzania:", err);
    document.getElementById('status').textContent = 'Kliknij gdzieś na stronie, żeby odblokować dźwięk';
  });

  const duration = isFirst ? 0.8 : 2; // na razie tylko 0.8 i 2 s – możesz dodać więcej

  let elapsed = 0;
  const interval = setInterval(() => {
    elapsed += 0.2;
    if (elapsed >= duration) {
      clearInterval(interval);
      audio.pause();
      document.getElementById('status').textContent = `Koniec ${duration}s fragmentu`;
    }
  }, 200);
}

function checkGuess() {
  const val = document.getElementById('guess').value.trim().toLowerCase();
  if (!val) return;

  const correct = currentSong.title.toLowerCase().includes(val) || currentSong.artist.toLowerCase().includes(val);

  const msg = document.getElementById('message');
  if (correct) {
    msg.innerHTML = `<span class="success">Brawo! To ${currentSong.title}</span>`;
  } else {
    msg.innerHTML = `<span class="fail">Nie tym razem... To było:</span><br><span class="reveal">${currentSong.title}</span>`;
  }

  audio.pause();
  setTimeout(() => {
    msg.innerHTML = '';
    // Jeśli chcesz dodać więcej piosenek – losuj następną
    // currentSong = songs[Math.floor(Math.random() * songs.length)];
    // loadSong();
  }, 4000);
}

function revealSong() {
  document.getElementById('message').innerHTML = `<span class="reveal">To było: ${currentSong.title}</span>`;
}

// Start gry
window.onload = loadSong;

// Odblokowanie dźwięku po pierwszym kliknięciu na stronę (Chrome/Edge wymagają interakcji)
document.addEventListener('click', () => {
  if (audio && audio.paused) {
    audio.play().catch(() => {});
  }
}, { once: true });
</script>
</body>
</html>
