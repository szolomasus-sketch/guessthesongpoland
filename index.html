<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaka to melodia – test GitHub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 16px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    h1 { margin: 0 0 20px; font-size: 2.4em; color: #ff79c6; }
    #status { font-size: 1.2em; margin: 15px 0; color: #a970ff; font-weight: bold; }
    #player-container {
      margin: 20px 0;
      text-align: center;
    }
    audio {
      width: 100%;
      max-width: 400px;
      margin: 15px auto;
      display: block;
    }
    .input-wrapper {
      position: relative;
      width: 90%;
      max-width: 420px;
      margin: 20px auto;
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 1.1em;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    button {
      padding: 12px 28px;
      font-size: 1.1em;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    #checkBtn { background: #9146ff; color: white; }
    #replayBtn { background: #10b981; color: white; }
    button:hover { transform: scale(1.05); }
    #message {
      font-size: 1.5em;
      margin: 25px 0;
      min-height: 1.8em;
      font-weight: bold;
    }
    .success { color: #56d364; }
    .fail { color: #f85149; }
    .reveal { color: #f0c674; font-style: italic; }
    #player-visible {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 80px;
      height: 80px;
      opacity: 0.4;
      z-index: 9999;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Jaka to melodia – test GitHub</h1>

  <div id="status">Kliknij gdziekolwiek na stronie, żeby zacząć</div>

  <div id="player-container">
    <audio id="audioPlayer" controls></audio>
  </div>

  <div class="input-wrapper">
    <input type="text" id="guess" placeholder="Wpisz tytuł / artystę..." autocomplete="off">
  </div>

  <div>
    <button id="checkBtn" onclick="checkGuess()">Sprawdź</button>
    <button id="replayBtn" onclick="playClip()">Odtwórz ponownie</button>
  </div>

  <div id="message"></div>
</div>

<!-- Mały widoczny player w rogu – użytkownik musi go zobaczyć i kliknąć raz -->
<div id="player-visible" onclick="startGame()">Kliknij mnie raz</div>

<script>
// Dane utworu – możesz dodać więcej
const songs = [
  {
    title: "Bruno Mars - Dance With Me",
    artist: "Bruno Mars",
    file: "https://raw.githubusercontent.com/szolomasus-sketch/guessthesongpoland/main/Bruno%20Mars%20-%20Dance%20With%20Me%20%5BOfficial%20Audio%5D.m4a"
  }
];

let currentSong = songs[0];
let audio = document.getElementById('audioPlayer');
let currentStartTime = null;
let gameStarted = false;

function startGame() {
  if (gameStarted) return;
  gameStarted = true;
  document.getElementById('player-visible').style.display = 'none';
  document.getElementById('status').textContent = 'Ładowanie utworu...';
  loadSong();
}

function loadSong() {
  audio.src = currentSong.file;
  audio.load();
  audio.onloadeddata = () => {
    document.getElementById('status').textContent = 'Gotowe – kliknij "Odtwórz ponownie" lub zacznij zgadywać';
  };
  audio.onerror = () => {
    document.getElementById('status').textContent = 'Błąd ładowania pliku – sprawdź nazwę i link';
  };
}

function playClip() {
  if (!audio || !gameStarted) {
    document.getElementById('status').textContent = 'Kliknij mały kwadrat w rogu lub gdziekolwiek na stronie';
    return;
  }

  let startTime = currentStartTime;

  if (!startTime) {
    startTime = Math.max(10, Math.floor(Math.random() * 140));
    currentStartTime = startTime;
  }

  audio.currentTime = startTime;
  audio.play().catch(err => {
    console.log("Błąd odtwarzania:", err);
    document.getElementById('status').textContent = 'Kliknij jeszcze raz na stronę lub player';
  });

  const duration = 0.8; // na razie tylko 0.8 s – możesz zmienić

  let elapsed = 0;
  const interval = setInterval(() => {
    elapsed += 0.2;
    if (elapsed >= duration) {
      clearInterval(interval);
      audio.pause();
      document.getElementById('status').textContent = `Koniec ${duration}s fragmentu`;
    }
  }, 200);
}

function checkGuess() {
  const val = document.getElementById('guess').value.trim().toLowerCase();
  if (!val) return;

  const msg = document.getElementById('message');
  const correct = currentSong.title.toLowerCase().includes(val) || currentSong.artist.toLowerCase().includes(val);

  if (correct) {
    msg.innerHTML = `<span class="success">Brawo! To ${currentSong.title}</span>`;
  } else {
    msg.innerHTML = `<span class="fail">Nie tym razem...</span><br><span class="reveal">${currentSong.title} – ${currentSong.artist}</span>`;
  }

  audio.pause();
}

// Start – czekamy na kliknięcie
document.addEventListener('click', () => {
  if (!gameStarted) {
    startGame();
  }
}, { once: true });
</script>
</body>
</html>
