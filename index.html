<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaka to melodia – edycja Twitch</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: #e0e0e0;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 16px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    h1 { margin: 0 0 20px; font-size: 2.4em; color: #ff79c6; }
    #status { font-size: 1.2em; margin: 15px 0; color: #a970ff; font-weight: bold; }
    .audio-bars {
      height: 80px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
      margin: 20px auto 30px;
      width: 90%;
      max-width: 400px;
    }
    .bar {
      width: 10px;
      background: linear-gradient(to top, #ff79c6, #a78bfa, #4ade80);
      border-radius: 5px 5px 0 0;
      transition: height 0.3s ease-out;
      opacity: 0.9;
    }
    .bar.active {
      animation: pulse 0.8s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scaleY(0.8); }
      50% { transform: scaleY(1.2); }
    }
    .input-wrapper {
      position: relative;
      width: 90%;
      max-width: 420px;
      margin: 20px auto;
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 1.1em;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: white;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    #suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(30,30,50,0.97);
      border-radius: 0 0 10px 10px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 10;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .suggestion {
      padding: 12px 16px;
      cursor: pointer;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: background 0.15s;
      font-size: 0.98em;
    }
    .suggestion:hover { background: rgba(100,100,255,0.22); }
    .suggestion:last-child { border-bottom: none; }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
    }
    button {
      padding: 12px 28px;
      font-size: 1.1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    #checkBtn { background: #9146ff; color: white; }
    #replayBtn { background: #10b981; color: white; }
    #longerBtn { background: #8b5cf6; color: white; display: none; }
    button:hover { transform: scale(1.05); }
    #message {
      font-size: 1.5em;
      margin: 25px 0;
      min-height: 1.8em;
      font-weight: bold;
    }
    .success { color: #56d364; }
    .fail { color: #f85149; }
    .reveal { color: #f0c674; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <h1>Jaka to melodia – edycja Twitch</h1>

  <div class="audio-bars" id="bars"></div>

  <div id="status">Kliknij gdziekolwiek na stronie, żeby zacząć</div>

  <!-- Ukryty odtwarzacz – nie widać go na ekranie -->
  <audio id="audioPlayer"></audio>

  <div class="input-wrapper">
    <input type="text" id="guess" placeholder="Wpisz tytuł / artystę..." autocomplete="off">
    <div id="suggestions"></div>
  </div>

  <div>
    <button id="checkBtn" onclick="checkGuess()">Sprawdź</button>
    <button id="replayBtn" onclick="playClip()">Odtwórz ponownie</button>
    <button id="longerBtn" onclick="nextLevel()">Dłuższy fragment</button>
  </div>

  <div id="message"></div>
</div>

<script>
// Lista piosenek (dodawaj kolejne po wrzuceniu mp3 do GitHuba)
const songs = [
  {
    title: "Bruno Mars - Dance With Me",
    artist: "Bruno Mars",
    file: "https://raw.githubusercontent.com/szolomasus-sketch/guessthesongpoland/main/Bruno%20Mars%20-%20Dance%20With%20Me%20%5BOfficial%20Audio%5D.m4a"
  }
  // Dodaj kolejne utwory tutaj, np.:
  // { title: "Inny utwór - Artysta", file: "https://raw.githubusercontent.com/.../nazwa.mp3" }
];

let currentSong = songs[0];
let audio = document.getElementById('audioPlayer');
let gameStarted = false;
let currentStartTime = null;
let currentDuration = 0.8; // domyślnie 0.8 s

function startGame() {
  if (gameStarted) return;
  gameStarted = true;
  document.getElementById('status').textContent = 'Gotowe – możesz grać fragmenty';
  audio.src = currentSong.file;
  audio.load();
  audio.volume = 1.0;
}

function playClip() {
  if (!gameStarted) {
    document.getElementById('status').textContent = 'Kliknij gdziekolwiek na stronie najpierw';
    return;
  }

  audio.currentTime = Math.max(5, Math.floor(Math.random() * 100)); // losowy start od 5 s
  currentStartTime = audio.currentTime; // zapamiętujemy start

  audio.play().catch(err => {
    console.log("Błąd play:", err);
    document.getElementById('status').textContent = 'Kliknij jeszcze raz na stronę';
  });

  let elapsed = 0;
  const interval = setInterval(() => {
    elapsed += 0.2;
    if (elapsed >= currentDuration) {
      clearInterval(interval);
      audio.pause();
      document.getElementById('status').textContent = `Koniec ${currentDuration}s fragmentu`;
    }
  }, 200);
}

function nextLevel() {
  const levels = [0.8, 2, 4, 7, 12, 18];
  if (currentDuration < levels[levels.length - 1]) {
    const nextIndex = levels.indexOf(currentDuration) + 1;
    currentDuration = levels[nextIndex] || levels[levels.length - 1];
    document.getElementById('status').textContent = `Przechodzę do ${currentDuration} s...`;
    playClip();
    if (currentDuration < 18) {
      document.getElementById('longerBtn').style.display = 'inline-block';
    }
  } else {
    document.getElementById('status').textContent = 'To już maksymalny fragment!';
  }
}

function checkGuess() {
  const val = document.getElementById('guess').value.trim().toLowerCase();
  if (!val) return;

  const msg = document.getElementById('message');
  const correct = currentSong.title.toLowerCase().includes(val) || currentSong.artist.toLowerCase().includes(val);

  if (correct) {
    msg.innerHTML = `<span class="success">Brawo! To ${currentSong.title} – ${currentSong.artist}</span>`;
  } else {
    msg.innerHTML = `<span class="fail">Nie tym razem...</span><br><span class="reveal">${currentSong.title} – ${currentSong.artist}</span>`;
  }

  audio.pause();
}

// Wyszukiwarka po jednej literze + sugestie
function showSuggestions(query) {
  const div = document.getElementById('suggestions');
  div.innerHTML = '';

  if (!query || query.length < 1) {
    div.style.display = 'none';
    return;
  }

  const lower = query.toLowerCase();
  const matches = songs.filter(s => s.title.toLowerCase().includes(lower));

  if (matches.length === 0) {
    div.style.display = 'none';
    return;
  }

  matches.slice(0, 10).forEach(s => {
    const el = document.createElement('div');
    el.className = 'suggestion';
    el.textContent = s.title;
    el.onclick = () => {
      document.getElementById('guess').value = s.title;
      div.style.display = 'none';
      checkGuess();
    };
    div.appendChild(el);
  });

  div.style.display = 'block';
}

const guessInput = document.getElementById('guess');
guessInput.addEventListener('input', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('focus', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('blur', () => setTimeout(() => document.getElementById('suggestions').style.display = 'none', 200));

document.addEventListener('click', e => {
  if (!guessInput.contains(e.target) && !document.getElementById('suggestions').contains(e.target)) {
    document.getElementById('suggestions').style.display = 'none';
  }
  if (!gameStarted) {
    startGame();
  }
}, { once: false });
</script>
</body>
</html>
