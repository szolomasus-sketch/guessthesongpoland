<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaka to melodia – edycja Twitch</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364); color: #e0e0e0; margin: 0; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { background: rgba(0,0,0,0.65); padding: 30px; border-radius: 16px; max-width: 520px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
    h1 { margin: 0 0 16px; font-size: 2.6em; color: #9146ff; }
    #status { font-size: 1.1em; margin: 12px 0 20px; color: #a970ff; font-weight: bold; }
    .audio-bars { height: 60px; display: flex; align-items: flex-end; justify-content: center; gap: 5px; margin: 16px auto 24px; width: 90%; max-width: 360px; }
    .bar { width: 8px; background: linear-gradient(to top, #9146ff, #a970ff, #b083ff); border-radius: 4px 4px 0 0; transition: height 0.4s ease-out; opacity: 0.85; }
    .bar.active { animation: pulse 1.3s infinite ease-in-out; }
    @keyframes pulse { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(1.15); } }
    .input-wrapper { position: relative; width: 90%; max-width: 420px; margin: 12px auto 20px; }
    input { width: 100%; padding: 14px; font-size: 1.1em; border: none; border-radius: 10px; background: rgba(255,255,255,0.12); color: white; }
    input::placeholder { color: rgba(255,255,255,0.5); }
    #suggestions { position: absolute; top: 100%; left: 0; right: 0; background: rgba(30,30,50,0.97); border-radius: 0 0 10px 10px; max-height: 320px; overflow-y: auto; z-index: 10; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
    .suggestion { padding: 12px 16px; cursor: pointer; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.07); transition: background 0.15s; font-size: 0.98em; }
    .suggestion:hover { background: rgba(145,70,255,0.22); }
    .suggestion:last-child { border-bottom: none; }
    .buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 16px; }
    button { padding: 11px 22px; font-size: 1.05em; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: all 0.18s; }
    #checkBtn { background: #9146ff; color: white; }
    #replayBtn { background: #9146ff88; color: white; }
    #skipBtn { background: #9146ff55; color: white; }
    #longerBtn { background: #9146ff33; color: white; display: none; }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(145,70,255,0.4); }
    #message { font-size: 1.45em; margin: 20px 0 12px; min-height: 1.6em; font-weight: bold; }
    .success { color: #56d364; }
    .fail { color: #f85149; }
    .reveal { color: #f0c674; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <h1>Jaka to melodia – edycja Twitch</h1>

  <div class="audio-bars" id="bars"></div>

  <div id="status">Ładowanie...</div>

  <div class="input-wrapper">
    <input type="text" id="guess" placeholder="Wpisz tytuł lub fragment..." autocomplete="off">
    <div id="suggestions"></div>
  </div>

  <div class="buttons">
    <button id="checkBtn" onclick="checkGuess()">Sprawdź</button>
    <button id="replayBtn" onclick="playClip()">Odtwórz ponownie</button>
    <button id="skipBtn" onclick="skipSong()">Pomiń</button>
    <button id="longerBtn" onclick="nextLevel()">Dłuższy fragment</button>
  </div>

  <div id="message"></div>
</div>

<div id="player" style="width:1px;height:1px;overflow:hidden;position:absolute;"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// Pełna lista tytułów z Twojej playlisty Spotify (możesz dodać więcej)
const PLAYLIST_TITLES = [
  "Baba Hassan, Pusher, Oska030, Luis Estrada - Moment",
  "Baba Hassan, Pusher, Oska030, Luis Estrada, Lotuseffekt - Cali Bags",
  "Baba Hassan, Pusher, Oska030, Oil Beatz, @atutowy - Baba Hassan",
  "Bedoes 2115, Lanek, Bialas, Taco Hemingway - SAUVAGE",
  "Bedoes 2115, Lanek, Kosa, White 2115 - Wschód (lubię zapierdalać)",
  // Dodaj tutaj resztę tytułów z playlisty – wystarczy skopiować z Spotify
  // np. "Taco Hemingway - 6 zer", itd.
];

let player = null;
let currentSong = null;
let clipLengths = [0.8, 2, 4, 7, 12, 18];
let currentAttempt = 0;
let hasUserInteracted = false;
let currentStartTime = null;

const MAX_DURATION = clipLengths[clipLengths.length - 1];
const barsCount = 10;

function initBars() {
  const container = document.getElementById('bars');
  container.innerHTML = '';
  for (let i = 0; i < barsCount; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    container.appendChild(bar);
  }
}

function updateBars(progress) {
  const bars = document.querySelectorAll('.bar');
  const activeCount = Math.round(barsCount * (progress / MAX_DURATION));
  bars.forEach((bar, i) => {
    if (i < activeCount) {
      bar.style.height = `${30 + Math.random() * 70}%`;
      bar.classList.add('active');
    } else {
      bar.style.height = '10%';
      bar.classList.remove('active');
    }
  });
}

function showLongerButton() {
  const btn = document.getElementById('longerBtn');
  if (currentAttempt < clipLengths.length - 1) {
    btn.style.display = 'inline-block';
    btn.textContent = `Dłuższy (${clipLengths[currentAttempt + 1]} s)`;
  } else {
    btn.style.display = 'none';
  }
}

function nextLevel() {
  if (currentAttempt < clipLengths.length - 1) {
    currentAttempt++;
    playClip();
    showLongerButton();
  }
}

function loadSong() {
  const status = document.getElementById('status');
  status.textContent = 'Ładowanie...';

  currentStartTime = null;

  if (PLAYLIST_TITLES.length === 0) {
    status.textContent = 'Brak piosenek';
    return;
  }

  const idx = Math.floor(Math.random() * PLAYLIST_TITLES.length);
  currentSong = { title: PLAYLIST_TITLES[idx] };

  status.textContent = 'Słuchaj...';

  // Losujemy dowolny utwór z YouTube jako podkład (możesz zmienić na konkretny)
  const randomYouTubeIds = ["dQw4w9WgXcQ", "kXYiU_JCYtU", "jNQXAC9IVRw"]; // przykłady
  const ytIdx = Math.floor(Math.random() * randomYouTubeIds.length);
  const videoId = randomYouTubeIds[ytIdx];

  if (player) {
    player.loadVideoById(videoId);
  } else {
    player = new YT.Player('player', {
      height: '1',
      width: '1',
      videoId: videoId,
      playerVars: {
        autoplay: 0,
        controls: 0,
        modestbranding: 1,
        rel: 0,
        fs: 0,
        mute: 1,
        enablejsapi: 1,
        playsinline: 1,
        disablekb: 1,
        origin: window.location.origin || 'https://www.youtube.com'
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': e => {
          if (e.data === YT.PlayerState.PLAYING && hasUserInteracted) {
            player.unMute();
          }
        }
      }
    });
  }

  resetGame();
  setTimeout(() => playClip(true), 1400);
}

function onPlayerReady(event) {
  console.log('Player gotowy');
}

function playClip(isFirst = false) {
  if (!player) return;

  if (hasUserInteracted) player.unMute();

  let startTime;

  if (isFirst || currentStartTime === null) {
    startTime = Math.max(10, Math.floor(Math.random() * 140));
    currentStartTime = startTime;
  } else {
    startTime = currentStartTime;
  }

  player.seekTo(startTime, true);
  player.playVideo();

  setTimeout(() => player.seekTo(startTime, true), 200);

  const duration = isFirst ? clipLengths[0] : clipLengths[currentAttempt];

  let elapsed = 0;
  const interval = setInterval(() => {
    elapsed += 0.2;
    updateBars(elapsed);
    if (elapsed >= duration) {
      clearInterval(interval);
      if (player.getPlayerState() === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      }
      updateBars(0);
      showLongerButton();
    }
  }, 200);

  document.getElementById('status').textContent = `Odtwarzam ${duration}s od ${startTime.toFixed(1)}s`;
}

function checkGuess() {
  if (!hasUserInteracted) {
    hasUserInteracted = true;
    if (player) player.unMute();
  }

  const val = document.getElementById('guess').value.trim();
  if (!val) return;

  const msg = document.getElementById('message');
  msg.innerHTML = '<span class="reveal">Sprawdzam... zgaduj na słuch!</span>';

  setTimeout(() => {
    msg.innerHTML = 'Następny utwór!';
    loadSong();
  }, 1500);

  document.getElementById('guess').value = '';
  hideSuggestions();
}

function skipSong() {
  const msg = document.getElementById('message');
  msg.innerHTML = `<span class="reveal">${currentSong.title || 'Tytuł nieznany'}</span><br><span class="fail">Pominięto</span>`;

  setTimeout(() => loadSong(), 3000);
}

function resetGame() {
  currentAttempt = 0;
  document.getElementById('message').textContent = '';
  document.getElementById('guess').value = '';
  updateBars(0);
  document.getElementById('longerBtn').style.display = 'none';
  hideSuggestions();
}

const guessInput = document.getElementById('guess');
guessInput.addEventListener('input', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('focus', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('blur', () => setTimeout(hideSuggestions, 180));

document.addEventListener('click', () => {
  if (!hasUserInteracted) {
    hasUserInteracted = true;
    if (player) player.unMute();
  }
}, { once: true });

function showSuggestions(query) {
  const div = document.getElementById('suggestions');
  div.innerHTML = '';

  if (!query || query.length < 1) {
    div.style.display = 'none';
    return;
  }

  const lower = query.toLowerCase();
  const matches = PLAYLIST_TITLES.filter(title => title.toLowerCase().includes(lower));

  if (matches.length === 0) {
    div.style.display = 'none';
    return;
  }

  matches.slice(0, 10).forEach(title => {
    const el = document.createElement('div');
    el.className = 'suggestion';
    el.textContent = title;
    el.onclick = () => {
      document.getElementById('guess').value = title;
      div.style.display = 'none';
      checkGuess();
    };
    div.appendChild(el);
  });

  div.style.display = 'block';
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

// Start gry
window.addEventListener('load', () => {
  loadSong();
});

</script>
</body>
</html>
