<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaka to melodia – edycja Twitch</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .container {
      background: #161b22;
      padding: 30px;
      border-radius: 12px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      border: 1px solid #30363d;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 2.6em;
      color: #9146ff;
      text-shadow: 0 0 10px rgba(145,70,255,0.6);
    }
    #status {
      font-size: 1.1em;
      margin: 12px 0 20px;
      color: #a970ff;
      font-weight: bold;
    }

    .audio-bars {
      height: 60px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      margin: 16px auto 24px;
      width: 90%;
      max-width: 360px;
    }
    .bar {
      width: 8px;
      background: linear-gradient(to top, #9146ff, #a970ff, #b083ff);
      border-radius: 4px 4px 0 0;
      transition: height 0.4s ease-out;
      opacity: 0.85;
    }
    .bar.active { animation: pulse 1.3s infinite ease-in-out; }
    @keyframes pulse {
      0%, 100% { transform: scaleY(1); opacity: 0.85; }
      50%      { transform: scaleY(1.15); opacity: 1; }
    }

    .input-wrapper {
      position: relative;
      width: 90%;
      max-width: 420px;
      margin: 12px auto 20px;
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 1.1em;
      border: 1px solid #30363d;
      border-radius: 10px;
      background: #0d1117;
      color: #c9d1d9;
    }
    input::placeholder { color: #8b949e; }

    #suggestions {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0 0 10px 10px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 10;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .suggestion {
      padding: 12px 16px;
      cursor: pointer;
      text-align: left;
      border-bottom: 1px solid #21262d;
      transition: background 0.15s;
      font-size: 0.98em;
    }
    .suggestion:hover { background: #21262d; }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    button {
      padding: 11px 22px;
      font-size: 1.05em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.18s;
    }
    #checkBtn    { background: #9146ff; color: white; }
    #replayBtn   { background: #9146ff88; color: white; }
    #skipBtn     { background: #9146ff55; color: white; }
    #longerBtn   { background: #9146ff33; color: white; display: none; }

    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(145,70,255,0.4); }

    #message {
      font-size: 1.45em;
      margin: 20px 0 12px;
      min-height: 1.6em;
      font-weight: bold;
    }
    .success { color: #56d364; }
    .fail    { color: #f85149; }
    .reveal  { color: #f0c674; font-style: italic; }

    .history-table {
      width: 100%;
      margin: 24px auto 0;
      border-collapse: collapse;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.95em;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .history-table.visible {
      opacity: 1;
    }
    .history-table th, .history-table td {
      padding: 10px 12px;
      border: 1px solid #30363d;
      text-align: center;
    }
    .history-table th {
      background: #21262d;
      color: #c9d1d9;
      font-weight: bold;
    }
    .history-table tr:nth-child(even) {
      background: rgba(13,17,23,0.7);
    }
    .history-table tr {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease;
    }
    .history-table tr.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Jaka to melodia – edycja Twitch</h1>

  <div class="audio-bars" id="bars"></div>

  <div id="status">Ładowanie...</div>

  <div class="input-wrapper">
    <input type="text" id="guess" placeholder="Wpisz tytuł / artystę..." autocomplete="off">
    <div id="suggestions"></div>
  </div>

  <div class="buttons">
    <button id="checkBtn" onclick="checkGuess()">Sprawdź</button>
    <button id="replayBtn" onclick="playClip()">Odtwórz ponownie</button>
    <button id="skipBtn" onclick="skipSong()">Pomiń</button>
    <button id="longerBtn" onclick="nextLevel()">Dłuższy fragment</button>
  </div>

  <div id="message"></div>

  <table class="history-table" id="historyTable">
    <thead>
      <tr>
        <th>Próba</th>
        <th>Długość</th>
        <th>Twój wpis</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div id="player" style="width:1px;height:1px;overflow:hidden;position:absolute;"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// Ręczna lista wszystkich ID z Twojej playlisty (45 utworów)
const MY_PLAYLIST_IDS = [
  "AhNQMjtrHgM", "rR001X7JQy8", "dEvG0E1NdTY", "uNVBBXa6CB8", "fRJcsG7nmtE",
  "U_FirAt6UKg", "npPaN-n7gCk", "efQJmUr4wAM", "4IwqHYcYEQA", "OMkYoXfmlUo",
  "7VLShc83YE0", "uPULY6PIRZQ", "8_RrKoBdw0o", "w4k_6tUw2mQ", "lqWt5L4hZU4",
  "ScGIPDlJKMY", "Ln8rAlXKv7o", "HNznlRJZRXw", "8J1stp9AbOk", "pKqVj-ermPY",
  "xSPz6uq3c1g", "I1PjrpN_87U", "AeyQI65fJxc", "Uho7xyVcG5c", "tSiOWFwHR4U",
  "uNqOIeumhZM", "mnFj4TB89pA", "cHmYhFesjGs", "M-0c2BpBmDQ", "TBVQp9d726Q",
  "LnNTD1BBe88", "ESC0fJ263fY", "fil7T3YMaqs", "pk2v0fPfWws", "Lrf4ZJjbnFE",
  "oT9VM2XQPdI", "BvRbKY8tloo", "-6KuSa0zgaA", "oKa9tnfZwP0", "4EAv2s8jZgo",
  "bH28HGZ1SMI", "TeYGpUbmONo", "Io65ZonGLos", "HRsEjGOKFm0", "iHDJ_xfW26Y"
];

let player = null;
let currentSong = {};
let clipLengths = [0.8, 2, 4, 7, 12, 18];
let currentAttempt = 0;
let attemptsLeft = 6;
let hasUserInteracted = false;
let currentStartTime = null;

const MAX_DURATION = clipLengths[clipLengths.length - 1];
const barsCount = 10;

function initBars() {
  const container = document.getElementById('bars');
  container.innerHTML = '';
  for (let i = 0; i < barsCount; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    container.appendChild(bar);
  }
}

function updateBars(progress) {
  const bars = document.querySelectorAll('.bar');
  const activeCount = Math.round(barsCount * (progress / MAX_DURATION));
  bars.forEach((bar, i) => {
    if (i < activeCount) {
      bar.style.height = `${30 + Math.random() * 70}%`;
      bar.classList.add('active');
    } else {
      bar.style.height = '10%';
      bar.classList.remove('active');
    }
  });
}

function showLongerButton() {
  const btn = document.getElementById('longerBtn');
  if (currentAttempt < clipLengths.length - 1) {
    btn.style.display = 'inline-block';
    btn.textContent = `Dłuższy (${clipLengths[currentAttempt + 1]} s)`;
  } else {
    btn.style.display = 'none';
  }
}

function nextLevel() {
  if (currentAttempt < clipLengths.length - 1) {
    currentAttempt++;
    playClip();
    showLongerButton();
  }
}

function onYouTubeIframeAPIReady() {
  initBars();
  loadSong();
}

function loadSong() {
  const status = document.getElementById('status');
  status.textContent = 'Ładowanie...';

  currentStartTime = null;

  if (MY_PLAYLIST_IDS.length === 0) {
    status.textContent = 'Brak piosenek w liście';
    return;
  }

  const idx = Math.floor(Math.random() * MY_PLAYLIST_IDS.length);
  const videoId = MY_PLAYLIST_IDS[idx];

  currentSong = {
    videoId: videoId,
    rawTitle: '???',     // bez API nie mamy tytułu – możesz ręcznie dodać jeśli chcesz
    rawArtist: '???',
    cleanTitle: '',
    cleanArtist: ''
  };

  status.textContent = 'Słuchaj...';

  if (player) {
    player.loadVideoById(videoId);
  } else {
    player = new YT.Player('player', {
      height: '1',
      width: '1',
      videoId: videoId,
      playerVars: {
        autoplay: 0,
        controls: 0,
        modestbranding: 1,
        rel: 0,
        fs: 0,
        mute: 1,
        enablejsapi: 1,
        playsinline: 1,
        disablekb: 1,
        origin: window.location.origin || 'https://www.youtube.com'
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': e => {
          if (e.data === YT.PlayerState.PLAYING && hasUserInteracted) {
            player.unMute();
          }
        }
      }
    });
  }

  resetGame();
  setTimeout(() => playClip(true), 1400);
}

function onPlayerReady(event) {
  console.log('Player gotowy');
}

function playClip(isFirst = false) {
  if (!player) return;

  if (hasUserInteracted) player.unMute();

  let startTime;

  if (isFirst || currentStartTime === null) {
    startTime = Math.max(10, Math.floor(Math.random() * 140));
    currentStartTime = startTime;
  } else {
    startTime = currentStartTime;
  }

  player.seekTo(startTime, true);

  player.playVideo();

  setTimeout(() => {
    player.seekTo(startTime, true);
  }, 200);

  const duration = isFirst ? clipLengths[0] : clipLengths[currentAttempt];

  let elapsed = 0;
  const interval = setInterval(() => {
    elapsed += 0.2;
    updateBars(elapsed);
    if (elapsed >= duration) {
      clearInterval(interval);
      if (player.getPlayerState() === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      }
      updateBars(0);
      showLongerButton();
    }
  }, 200);

  document.getElementById('status').textContent = `Odtwarzam ${duration}s od ${startTime.toFixed(1)}s`;
}

function checkGuess() {
  if (!hasUserInteracted) {
    hasUserInteracted = true;
    if (player) player.unMute();
  }

  const val = document.getElementById('guess').value.trim();
  if (!val) return;

  const msg = document.getElementById('message');

  // Symulacja sprawdzenia (bez API nie porównujemy tytułu)
  msg.innerHTML = 'Sprawdzam... (zgaduj na słuch!)';

  addHistoryRow(currentAttempt + 1, clipLengths[currentAttempt], val, false); // zawsze dodajemy wiersz

  setTimeout(() => {
    msg.innerHTML = 'Następny utwór!';
    loadSong();
  }, 1500);

  document.getElementById('guess').value = '';
  hideSuggestions();
}

function skipSong() {
  const msg = document.getElementById('message');
  msg.innerHTML = 'Pominięto – następny!';

  addHistoryRow(currentAttempt + 1, clipLengths[currentAttempt], 'pominięto', false);

  setTimeout(loadSong, 1500);
}

function addHistoryRow(attempt, duration, guessText, isCorrect) {
  const tbody = document.querySelector('#historyTable tbody');
  const tr = document.createElement('tr');

  tr.innerHTML = `
    <td>${attempt}</td>
    <td>${duration}s</td>
    <td>${guessText || '(brak wpisu)'}</td>
  `;

  tbody.appendChild(tr);

  // Pokazujemy tabelkę i animujemy wiersz
  document.getElementById('historyTable').classList.add('visible');
  setTimeout(() => tr.classList.add('visible'), 50);
}

function resetGame() {
  currentAttempt = 0;
  attemptsLeft = 6;
  document.getElementById('message').textContent = '';
  document.getElementById('guess').value = '';
  updateBars(0);
  document.getElementById('longerBtn').style.display = 'none';
  hideSuggestions();

  // Czyścimy tabelkę
  document.querySelector('#historyTable tbody').innerHTML = '';
  document.getElementById('historyTable').classList.remove('visible');
}

const guessInput = document.getElementById('guess');
guessInput.addEventListener('input', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('focus', () => showSuggestions(guessInput.value.trim()));
guessInput.addEventListener('blur', () => setTimeout(hideSuggestions, 180));

document.addEventListener('click', e => {
  if (!hasUserInteracted) {
    hasUserInteracted = true;
    if (player) player.unMute();
  }
  if (!guessInput.contains(e.target) && !document.getElementById('suggestions').contains(e.target)) {
    hideSuggestions();
  }
});

function showSuggestions(query) {
  const div = document.getElementById('suggestions');
  div.innerHTML = '';

  if (!query || query.length < 1) {
    div.style.display = 'none';
    return;
  }

  // Tutaj możesz dodać proste sugestie ręczne, jeśli chcesz (bez API)
  // Na razie wyłączone
  hideSuggestions();
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display = 'none';
}

</script>
</body>
</html>
